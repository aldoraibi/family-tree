<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>شجرة العائلة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

  html, body { margin: 0; height: 100%; overflow: hidden; font-family: 'Tajawal', sans-serif; background: #efe9db; }

    position: fixed; top: 0; right: 0; left: 0; z-index: 20;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 10px 18px;
    background: linear-gradient(180deg, #4e3316, #3a2710);
    border-bottom: 3px solid #c9a25e;
    box-shadow: 0 2px 14px #0005;
  }
  #topbar h1 { font-size: 21px; margin: 0 0 0 14px; color: #e9c98a; font-family: 'Aref Ruqaa', serif; text-shadow: 0 1px 3px #0007; }
  #topbar button, #panel button, .mbtns button {
    font-family: inherit; font-size: 13px; padding: 7px 15px; border-radius: 20px;
    border: 1px solid #b3925c; background: #fdf6e6; color: #4a3418; cursor: pointer;
    transition: background .15s, transform .1s;
  }
  #topbar button:hover, #panel button:hover { background: #f1e2bf; transform: translateY(-1px); }
  button.primary { background: linear-gradient(180deg, #b88746, #96682e) !important; color: #fff !important; border-color: #7a5426 !important; font-weight: 700; }
  #searchBox {
    font-family: inherit; font-size: 13px; padding: 7px 14px; border-radius: 20px;
    border: 1px solid #b3925c; width: 170px; background: #fdf6e6;
  }
  #autosaveNote { font-size: 11px; color: #cbb185; margin-right: auto; }

  #stage { position: absolute; inset: 0; top: 0; }
  #svg { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
  #svg:active { cursor: grabbing; }

  .node { cursor: pointer; }
  .nname { font: 500 13px 'Tajawal', sans-serif; fill: #3b2a12; paint-order: stroke; stroke: #fdf8ec; stroke-width: 3.5px; stroke-linejoin: round; }
  .rootname { font: 700 52px 'Aref Ruqaa', serif; fill: #2b1a07; }
  .cartouche-t { font: 700 46px 'Aref Ruqaa', serif; fill: #f3dfae; }
  .hint { font: 24px 'Tajawal', sans-serif; fill: #a3947a; }

  #panel {
    position: fixed; top: 70px; left: 14px; z-index: 20; width: 250px;
    background: #fffdf7; border: 2px solid #d8cfb8; border-radius: 14px;
    padding: 14px; box-shadow: 0 4px 18px #0002;
  }
  #panel h2 { margin: 0 0 4px; font-size: 18px; color: #4a3418; font-family: 'Aref Ruqaa', serif; }
  #pInfo { font-size: 12px; color: #7a6a48; margin: 0 0 8px; }
  #pLineage { font-size: 13px; color: #333; background: #f7f0dd; border-radius: 8px; padding: 8px; margin: 0 0 10px; line-height: 1.7; }
  #panel .pbtns { display: flex; flex-wrap: wrap; gap: 6px; }
  #btnDelete { color: #a02020 !important; }

  #legend {
    position: fixed; bottom: 12px; left: 14px; z-index: 15;
    background: #fffdf7e6; border: 2px solid #d8cfb8; border-radius: 12px;
    padding: 10px 12px; font-size: 12px; color: #4a3418; line-height: 1.5;
    max-width: 210px;
  }
  #legend h3 { margin: 0 0 6px; font-size: 13px; font-family: 'Aref Ruqaa', serif; }
  #legend .lrow { display: flex; align-items: center; gap: 8px; }
  #legend svg { flex: 0 0 auto; }

  #modal {
    position: fixed; inset: 0; z-index: 30; background: #0006;
    display: flex; align-items: center; justify-content: center;
  }
  .mbox {
    background: #fffdf7; border-radius: 14px; padding: 20px; width: 300px;
    border: 2px solid #d8cfb8;
  }
  .mbox h3 { margin: 0 0 12px; color: #4a3418; }
  .mbox label { display: block; font-size: 13px; margin-bottom: 10px; color: #4a3418; }
  .mbox input[type=text] {
    width: 100%; font-family: inherit; font-size: 15px; padding: 8px;
    border: 1px solid #c9b88f; border-radius: 8px; margin-top: 4px; background: #fff;
  }

  .mrow label { display: flex; align-items: center; gap: 5px; margin: 0; }
  .mbtns { display: flex; gap: 8px; justify-content: flex-start; }
  .hidden { display: none !important; }

    position: fixed; top: 52px; right: 50%; transform: translateX(50%);
    z-index: 25; background: #d97706; color: #fff; font-size: 13px;
    padding: 8px 16px; border-radius: 0 0 10px 10px; box-shadow: 0 3px 10px #0003;
  }

    #panel { width: calc(100% - 28px); top: auto; bottom: 12px; }
    #legend { display: none; }

    '<rect x="' + (CX - 288) + '" y="82" width="576" height="72" rx="12" fill="none" stroke="#c9a25e" stroke-width="1" opacity="0.7"/>' +
    '<text x="' + CX + '" y="139" text-anchor="middle" class="cartouche-t">شجرة العائلة</text></g>';
  out += '<path d="M' + (CX - 440) + ',2018 Q' + CX + ',1950 ' + (CX + 440) + ',2018 L' + (CX + 440) + ',2034 L' + (CX - 440) + ',2034 Z" fill="#ddd0aa"/>';
  out += branchesSVG('root');
  out += foliageSVG();
  out += trunkSVG();
  for (const p of Object.values(data.persons)) {
    if (p.id !== 'root') out += shapeSVG(p);
  }
  if (childrenOf('root').length === 0) {
    out += '<text x="' + CX + '" y="1180" text-anchor="middle" class="hint">انقر على الجذع ثم «إضافة ابن / ابنة» لبدء بناء الشجرة</text>';
  }
  return out;
}

/* ---------- العرض ---------- */
const svg = $('svg'), vp = $('vp'), stage = $('stage');

function applyTransform() {
  vp.setAttribute('transform', 'translate(' + view.x + ',' + view.y + ') scale(' + view.k + ')');
}
function fitView() {
  const r = stage.getBoundingClientRect();
  view.k = Math.min(r.width / W, r.height / H) * 0.96;
  view.x = (r.width - W * view.k) / 2;
  view.y = (r.height - H * view.k) / 2 + 20;
  applyTransform();
}
function centerOn(id) {
  const pos = id === 'root' ? { x: CX, y: 1550 } : positions[id];
  if (!pos) return;
  const r = stage.getBoundingClientRect();
  view.k = Math.max(view.k, 0.7);
  view.x = r.width / 2 - pos.x * view.k;
  view.y = r.height / 2 - pos.y * view.k;
  applyTransform();
  userMoved = true;
}
function render() {
  vp.innerHTML = buildScene();
  showPanel();
}

/* ---------- لوحة التفاصيل ---------- */
function showPanel() {
  const panel = $('panel');
  if (!selectedId || !data.persons[selectedId]) {
    panel.classList.add('hidden');
    return;
  }
  const p = data.persons[selectedId];
  const g = genOf(p.id);
  $('pName').textContent = p.name;
  let shapeTxt;
  if (p.id === 'root') shapeTxt = 'الجذع (الجد الأعلى)';
  else if (p.gender === 'f') shapeTxt = 'أنثى — ورقة خضراء';
  else shapeTxt = SHAPE_NAMES[g] || 'زهرة زرقاء (جيل متقدم)';
  $('pInfo').textContent = 'الجيل ' + (ORDINALS[g] || g) + ' • ' + shapeTxt;
  $('pLineage').textContent = lineage(p.id);
  $('btnDelete').style.display = p.id === 'root' ? 'none' : '';
  $('btnMove').style.display = p.id === 'root' ? 'none' : '';
  panel.classList.remove('hidden');
}

/* ---------- النافذة المنبثقة ---------- */
function openModal(mode) {
  modalMode = mode;
  const p = data.persons[selectedId];
  if (mode === 'edit') {
    $('mTitle').textContent = 'تعديل: ' + p.name;
    $('mName').value = p.name;
    document.querySelector('input[name=mGender][value=' + p.gender + ']').checked = true;
    $('mGenderRow').style.display = p.id === 'root' ? 'none' : '';
  } else {
    $('mTitle').textContent = 'إضافة ابن / ابنة لـ ' + p.name;
    $('mName').value = '';
    document.querySelector('input[name=mGender][value=m]').checked = true;
    $('mGenderRow').style.display = '';
  }
  $('modal').classList.remove('hidden');
  setTimeout(() => $('mName').focus(), 50);
}
function closeModal() {
  $('modal').classList.add('hidden');
  modalMode = null;
}
function saveModal() {
  const name = $('mName').value.trim();
  if (!name) { $('mName').focus(); return; }
  const gender = document.querySelector('input[name=mGender]:checked').value;
  if (modalMode === 'add') {
    const id = 'p' + data.nextId;
    data.persons[id] = { id: id, name: name, gender: gender, parentId: selectedId, seq: data.nextId };
    data.nextId++;
    selectedId = id;
  } else if (modalMode === 'edit') {
    const p = data.persons[selectedId];
    p.name = name;
    if (p.id !== 'root') p.gender = gender;
  }
  saveData();
  closeModal();
  render();
}

/* ---------- الأحداث ---------- */
let pointers = new Map();
let dragStart = null, pinchStart = null, movedFlag = false;

svg.addEventListener('pointerdown', e => {
  svg.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size === 1) {
    dragStart = { x: e.clientX, y: e.clientY, vx: view.x, vy: view.y };
    movedFlag = false;
  } else if (pointers.size === 2) {
    const pts = [...pointers.values()];
    pinchStart = {
      d: Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y),
      k: view.k, vx: view.x, vy: view.y,
      cx: (pts[0].x + pts[1].x) / 2, cy: (pts[0].y + pts[1].y) / 2
    };
    dragStart = null;
  }
});
svg.addEventListener('pointermove', e => {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pinchStart && pointers.size === 2) {
    const pts = [...pointers.values()];
    const d = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y) || 1;
    const nk = clamp(pinchStart.k * d / pinchStart.d, 0.08, 3);
    const f = nk / pinchStart.k;
    view.x = pinchStart.cx - (pinchStart.cx - pinchStart.vx) * f;
    view.y = pinchStart.cy - (pinchStart.cy - pinchStart.vy) * f;
    view.k = nk;
    userMoved = true;
    applyTransform();
  } else if (dragStart) {
    const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
    if (Math.abs(dx) + Math.abs(dy) > 5) movedFlag = true;
    view.x = dragStart.vx + dx;
    view.y = dragStart.vy + dy;
    if (movedFlag) userMoved = true;
    applyTransform();
  }
});
svg.addEventListener('pointerup', e => {
  pointers.delete(e.pointerId);
  if (pointers.size < 2) pinchStart = null;
  if (pointers.size === 0) {
    if (!movedFlag) handleClick(e);
    dragStart = null;
  }
});
svg.addEventListener('pointercancel', e => {
  pointers.delete(e.pointerId);
  pinchStart = null;
  dragStart = null;
});
function handleClick(e) {
  const t = e.target.closest ? e.target.closest('.node') : null;
  if (movingId) {
    if (t) {
      const target = t.getAttribute('data-id');
      if (target === movingId || subtreeIds(movingId).includes(target)) {
        alert('لا يمكن النقل إلى الشخص نفسه أو أحد ذريته');
      } else {
        data.persons[movingId].parentId = target;
        selectedId = movingId;
        saveData();
      }
    }
    movingId = null;
    $('moveBanner').classList.add('hidden');
    render();
    return;
  }
  if (t) selectedId = t.getAttribute('data-id');
  else selectedId = null;
  render();
}
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const nk = clamp(view.k * factor, 0.08, 3);
  const f = nk / view.k;
  const rect = svg.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  view.x = mx - (mx - view.x) * f;
  view.y = my - (my - view.y) * f;
  view.k = nk;
  userMoved = true;
  applyTransform();
}, { passive: false });

/* أزرار */
$('btnAdd').addEventListener('click', () => {
  if (!selectedId) { alert('اختر شخصاً من الشجرة أولاً (أو انقر على الجذع)'); return; }
  openModal('add');
});
$('btnAddChild').addEventListener('click', () => openModal('add'));
$('btnEdit').addEventListener('click', () => openModal('edit'));
$('btnMove').addEventListener('click', () => {
  if (!selectedId || selectedId === 'root') return;
  movingId = selectedId;
  $('moveBanner').classList.remove('hidden');
});
$('btnClose').addEventListener('click', () => { selectedId = null; render(); });
$('btnDelete').addEventListener('click', () => {
  if (!selectedId || selectedId === 'root') return;
  const ids = subtreeIds(selectedId);
  const msg = ids.length === 1
    ? 'هل تريد حذف «' + data.persons[selectedId].name + '»؟'
    : 'سيُحذف «' + data.persons[selectedId].name + '» ومعه ' + (ids.length - 1) + ' من ذريته. متابعة؟';
  if (!confirm(msg)) return;
  for (const id of ids) delete data.persons[id];
  selectedId = null;
  saveData();
  render();
});
$('mSave').addEventListener('click', saveModal);
$('mCancel').addEventListener('click', closeModal);
$('mName').addEventListener('keydown', e => { if (e.key === 'Enter') saveModal(); });
$('modal').addEventListener('click', e => { if (e.target === $('modal')) closeModal(); });
$('btnFit').addEventListener('click', () => { fitView(); userMoved = false; });
$('btnReset').addEventListener('click', () => {
  if (!confirm('سيُمسح كل شيء وتعود الشجرة إلى الجذع فقط. متأكد؟')) return;
  data = defaultData();
  selectedId = null;
  saveData();
  render();
  fitView();
});

/* بحث */
$('searchBox').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const q = e.target.value.trim();
  if (!q) return;
  const hit = Object.values(data.persons).find(p => p.name.includes(q));
  if (hit) {
    selectedId = hit.id;
    render();
    centerOn(hit.id);
  } else {
    alert('لا يوجد اسم يطابق «' + q + '»');
  }
});

/* تصدير واستيراد */
$('btnExport').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'شجرة-العائلة.json';
  a.click();
  URL.revokeObjectURL(a.href);
});
$('btnImport').addEventListener('click', () => $('importFile').click());
$('importFile').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const d = JSON.parse(reader.result);
      if (!d || !d.persons || !d.persons.root) throw new Error('bad');
      if (!d.nextId) d.nextId = Object.keys(d.persons).length + 1;
      data = d;
      selectedId = null;
      saveData();
      render();
      fitView();
    } catch (err) {
      alert('الملف غير صالح — يجب أن يكون نسخة محفوظة من هذا الموقع');
    }
  };
  reader.readAsText(f);
  e.target.value = '';
});

/* تصدير صورة */
$('btnPNG').addEventListener('click', () => {
  const keep = selectedId;
  selectedId = null;
  const inner = buildScene();
  selectedId = keep;
  const style = '<style>.nname{font:500 13px Tajawal,sans-serif;fill:#3b2a12;paint-order:stroke;stroke:#fdf8ec;stroke-width:3.5px;stroke-linejoin:round}.rootname{font:700 52px "Aref Ruqaa",serif;fill:#2b1a07}.cartouche-t{font:700 46px "Aref Ruqaa",serif;fill:#f3dfae}.hint{font:24px Tajawal,sans-serif;fill:#a3947a}</style>';
  const svgStr = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + W + ' ' + H + '" width="' + W + '" height="' + H + '">' +
    style +
    '<rect width="' + W + '" height="' + H + '" fill="#efe9db"/>' + inner + '</svg>';
  const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = W * 2;
    c.height = H * 2;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#efe9db';
    ctx.fillRect(0, 0, c.width, c.height);
    ctx.drawImage(img, 0, 0, c.width, c.height);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = 'شجرة-العائلة.png';
    a.href = c.toDataURL('image/png');
    a.click();
  };
  img.onerror = () => { URL.revokeObjectURL(url); alert('تعذر تصدير الصورة'); };
  img.src = url;
});

/* ---------- البداية ---------- */
window.addEventListener('resize', () => { if (!userMoved) fitView(); });
render();
fitView();
</script>
